services:
  work-report-app:
    build: .
    container_name: work-report-app
    restart: unless-stopped
    # Use host network so the container can reach a PostgreSQL instance running
    # on the host (DATABASE_URL can use localhost). This also exposes port 3000
    # on the host directly, so no `ports` mapping is needed.
    # NOTE: network_mode: host is Linux-only. On Windows/macOS, switch to a
    # bridge network with `ports: ["3000:3000"]` and use host.docker.internal
    # in DATABASE_URL.
    network_mode: "host"
    environment:
      - NODE_ENV=production
      # Required: JWT Secret for session tokens
      - JWT_SECRET=${JWT_SECRET}
      # Required: PostgreSQL Database URL
      - DATABASE_URL=${DATABASE_URL}
      # Optional: SMTP Configuration (for password reset emails)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-WorkReport}
      # Optional: Google OAuth Configuration
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_ALLOWED_DOMAINS=${GOOGLE_ALLOWED_DOMAINS:-}
      # Application URL
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
